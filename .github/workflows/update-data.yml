name: Actualizar históricos

on:
  schedule:
    - cron: '0 21 * * 1-5'  # 18hs Argentina (UTC-3) = 21hs UTC, lunes a viernes
  workflow_dispatch:          # también se puede correr manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests yfinance pandas urllib3

      - name: Correr script
        run: python update_historicos.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/historicos.json
          git diff --staged --quiet || git commit -m "chore: actualizar históricos $(date -u +%Y-%m-%d)"
          git push
