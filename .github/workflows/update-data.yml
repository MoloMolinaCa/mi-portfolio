name: Actualizar históricos

on:
  schedule:
    - cron: '0 00 * * 2-6'  # 21hs Argentina (UTC-3), martes a sábado
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests yfinance pandas urllib3

      - name: Correr script
        run: python update_historicos.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/historicos.json
          git diff --staged --quiet || git commit -m "chore: actualizar históricos $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
